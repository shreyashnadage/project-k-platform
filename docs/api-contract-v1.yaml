openapi: 3.1.0
info:
  title: Borrower Gateway - OCEN LA
  version: 0.2.0
paths:
  /ops/hold:
    post:
      tags:
      - ops
      summary: Ops Hold
      description: Hold an application before OCEN submission via Temporal signal.
      operationId: ops_hold_ops_hold_post
      parameters:
      - name: authorization
        in: header
        required: true
        schema:
          type: string
          title: Authorization
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OpsHoldRequest'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OpsCommandResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /ops/release:
    post:
      tags:
      - ops
      summary: Ops Release
      description: Release a held application via Temporal signal.
      operationId: ops_release_ops_release_post
      parameters:
      - name: authorization
        in: header
        required: true
        schema:
          type: string
          title: Authorization
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OpsReleaseRequest'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OpsCommandResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /ops/flag:
    post:
      tags:
      - ops
      summary: Ops Flag
      description: Add an ops annotation/flag to an application record.
      operationId: ops_flag_ops_flag_post
      parameters:
      - name: authorization
        in: header
        required: true
        schema:
          type: string
          title: Authorization
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OpsFlagRequest'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OpsCommandResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /ops/escalate:
    post:
      tags:
      - ops
      summary: Ops Escalate
      description: Escalate to collections (post-disbursement).
      operationId: ops_escalate_ops_escalate_post
      parameters:
      - name: authorization
        in: header
        required: true
        schema:
          type: string
          title: Authorization
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OpsEscalateRequest'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OpsCommandResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /ops/applications/active:
    get:
      tags:
      - ops
      summary: List Active Applications
      description: List non-terminal applications for reconciliation.
      operationId: list_active_applications_ops_applications_active_get
      parameters:
      - name: authorization
        in: header
        required: true
        schema:
          type: string
          title: Authorization
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OpsApplicationList'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /ops/applications/{application_id}:
    get:
      tags:
      - ops
      summary: Get Application Detail
      description: Full application detail for ops view.
      operationId: get_application_detail_ops_applications__application_id__get
      parameters:
      - name: application_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Application Id
      - name: authorization
        in: header
        required: true
        schema:
          type: string
          title: Authorization
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OpsApplicationDetail'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /ops/vendor/invite:
    post:
      tags:
      - ops
      summary: Invite Vendor
      description: Create a pending vendor record and generate invite token.
      operationId: invite_vendor_ops_vendor_invite_post
      parameters:
      - name: authorization
        in: header
        required: true
        schema:
          type: string
          title: Authorization
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VendorInviteRequest'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VendorInviteResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /ops/anchor/onboard:
    post:
      tags:
      - ops
      summary: Onboard Anchor
      description: Create an anchor record in the platform.
      operationId: onboard_anchor_ops_anchor_onboard_post
      parameters:
      - name: authorization
        in: header
        required: true
        schema:
          type: string
          title: Authorization
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AnchorOnboardRequest'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AnchorOnboardResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /vendors/verify-udyam:
    post:
      tags:
      - vendors
      summary: Verify Udyam
      description: Verify Udyam number and return enterprise details for auto-population.
      operationId: verify_udyam_vendors_verify_udyam_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UdyamVerifyRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UdyamVerifyResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /vendors/register:
    post:
      tags:
      - vendors
      summary: Register Vendor
      description: 'Vendor self-registration from PWA. No auth required (public endpoint).


        If udyam_number is provided, auto-verifies and populates enterprise data.'
      operationId: register_vendor_vendors_register_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VendorRegisterRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VendorRegisterResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /vendors/activate:
    post:
      tags:
      - vendors
      summary: Activate Vendor
      description: Complete an invited vendor's registration (from PWA invite flow).
      operationId: activate_vendor_vendors_activate_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VendorActivateRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VendorRegisterResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /dpdp/rights/submit:
    post:
      tags:
      - dpdp
      summary: Submit Dsr
      description: Submit a Data Subject Rights request (access, erasure, correction).
      operationId: submit_dsr_dpdp_rights_submit_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DSRSubmitRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DSRSubmitResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /dpdp/rights/{request_id}:
    get:
      tags:
      - dpdp
      summary: Get Dsr Status
      description: Check the status of a DSR request.
      operationId: get_dsr_status_dpdp_rights__request_id__get
      parameters:
      - name: request_id
        in: path
        required: true
        schema:
          type: string
          title: Request Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DSRStatusResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /dpdp/consent/{data_principal_id}:
    get:
      tags:
      - dpdp
      summary: Get Consent Status
      description: Get all consent records for a data principal.
      operationId: get_consent_status_dpdp_consent__data_principal_id__get
      parameters:
      - name: data_principal_id
        in: path
        required: true
        schema:
          type: string
          title: Data Principal Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConsentStatusResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /loans/apply:
    post:
      summary: Apply For Loan
      operationId: apply_for_loan_loans_apply_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoanApplicationRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoanApplicationResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /loans/status:
    post:
      summary: Get Loan Status
      operationId: get_loan_status_loans_status_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ApplicationStatusRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoanApplicationStatus'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /invoices/captured:
    post:
      summary: Capture Invoice
      description: 'Receive invoice notification from ERP connector (ERPNext/Frappe).


        Verified via inbound HMAC signature (X-Platform-Signature header, same

        BACKOFFICE_WEBHOOK_SECRET and scheme used for outbound delivery in

        services/backoffice_sync/webhook_client.py). Skipped only in sandbox mode.'
      operationId: capture_invoice_invoices_captured_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InvoiceCapturedRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InvoiceCapturedResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /v4.0.0alpha/loanApplications/createLoanResponse:
    post:
      summary: Create Loan Response
      description: "OCEN async callback \u2014 lender posts loan decision back to\
        \ LA."
      operationId: create_loan_response_v4_0_0alpha_loanApplications_createLoanResponse_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateLoanApplicationResponse'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OcenAckResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /v4.0.0alpha/loanApplications/generateOffersResponse:
    post:
      summary: Generate Offers Response
      description: "OCEN callback \u2014 lender posts generated offers back to LA."
      operationId: generate_offers_response_v4_0_0alpha_loanApplications_generateOffersResponse_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateLoanApplicationResponse'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OcenAckResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /v4.0.0alpha/loanApplications/setOffersResponse:
    post:
      summary: Set Offers Response
      description: "OCEN callback \u2014 lender confirms selected offer."
      operationId: set_offers_response_v4_0_0alpha_loanApplications_setOffersResponse_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateLoanApplicationResponse'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OcenAckResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /v4.0.0alpha/loanApplications/loanAgreementResponse:
    post:
      summary: Loan Agreement Response
      description: "OCEN callback \u2014 lender posts loan agreement for e-sign."
      operationId: loan_agreement_response_v4_0_0alpha_loanApplications_loanAgreementResponse_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateLoanApplicationResponse'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OcenAckResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /v4.0.0alpha/loanApplications/grantLoanResponse:
    post:
      summary: Grant Loan Response
      description: "OCEN callback \u2014 lender confirms loan grant."
      operationId: grant_loan_response_v4_0_0alpha_loanApplications_grantLoanResponse_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateLoanApplicationResponse'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OcenAckResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /v4.0.0alpha/loanApplications/triggerDisbursementResponse:
    post:
      summary: Trigger Disbursement Response
      description: "OCEN callback \u2014 lender confirms disbursement."
      operationId: trigger_disbursement_response_v4_0_0alpha_loanApplications_triggerDisbursementResponse_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateLoanApplicationResponse'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OcenAckResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /v4.0.0alpha/loanApplications/triggerRepaymentResponse:
    post:
      summary: Trigger Repayment Response
      description: "OCEN callback \u2014 repayment event from lender."
      operationId: trigger_repayment_response_v4_0_0alpha_loanApplications_triggerRepaymentResponse_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateLoanApplicationResponse'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OcenAckResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /v4.0.0alpha/loanApplications/setRepaymentPlanResponse:
    post:
      summary: Set Repayment Plan Response
      description: "OCEN callback \u2014 lender sets repayment plan."
      operationId: set_repayment_plan_response_v4_0_0alpha_loanApplications_setRepaymentPlanResponse_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateLoanApplicationResponse'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OcenAckResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /brand:
    get:
      summary: Get Brand
      description: Brand config for PWA/frontend theming. Reads from brand.yaml.
      operationId: get_brand_brand_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                additionalProperties: true
                type: object
                title: Response Get Brand Brand Get
  /health:
    get:
      summary: Health
      operationId: health_health_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                additionalProperties:
                  anyOf:
                  - type: string
                  - type: boolean
                type: object
                title: Response Health Health Get
components:
  schemas:
    Address:
      properties:
        hba:
          type: string
          title: Hba
          default: ''
        srl:
          type: string
          title: Srl
          default: ''
        landmark:
          type: string
          title: Landmark
          default: ''
        als:
          type: string
          title: Als
          default: ''
        vtc:
          type: string
          title: Vtc
          default: ''
        pinCode:
          type: string
          title: Pincode
          default: ''
        po:
          type: string
          title: Po
          default: ''
        district:
          type: string
          title: District
          default: ''
        state:
          type: string
          title: State
          default: ''
        country:
          type: string
          title: Country
          default: India
      type: object
      title: Address
      description: Contact address.
    AnchorOnboardRequest:
      properties:
        name:
          type: string
          title: Name
          dpdp_category: name
          dpdp_purposes:
          - loan_origination
          - ops_management
          dpdp_retention_days: 2555
          dpdp_tier: standard
        gstin:
          type: string
          maxLength: 15
          minLength: 15
          title: Gstin
          dpdp_category: financial_identifier
          dpdp_purposes:
          - loan_origination
          - kind1_attestation
          dpdp_retention_days: 2555
          dpdp_tier: standard
        sector:
          anyOf:
          - type: string
          - type: 'null'
          title: Sector
        region:
          anyOf:
          - type: string
          - type: 'null'
          title: Region
        onboarded_by:
          type: string
          title: Onboarded By
      type: object
      required:
      - name
      - gstin
      - onboarded_by
      title: AnchorOnboardRequest
      description: Ops onboards an anchor.
    AnchorOnboardResponse:
      properties:
        anchor_id:
          type: string
          format: uuid
          title: Anchor Id
        status:
          type: string
          title: Status
          default: onboarded
        message:
          type: string
          title: Message
      type: object
      required:
      - anchor_id
      - message
      title: AnchorOnboardResponse
      description: Response after anchor onboarding.
    ApplicationStatusRequest:
      properties:
        application_id:
          type: string
          format: uuid
          title: Application Id
      type: object
      required:
      - application_id
      title: ApplicationStatusRequest
    Borrower:
      properties:
        primaryId:
          type: string
          title: Primaryid
        primaryIdType:
          type: string
          title: Primaryidtype
          default: PAN
        name:
          type: string
          title: Name
          default: ''
        category:
          type: string
          title: Category
          default: ORGANIZATION
        contactDetails:
          items:
            $ref: '#/components/schemas/ContactDetail'
          type: array
          title: Contactdetails
        additionalIdentifiers:
          items:
            additionalProperties: true
            type: object
          type: array
          title: Additionalidentifiers
        documents:
          items:
            $ref: '#/components/schemas/Document'
          type: array
          title: Documents
        aaIdentifier:
          type: string
          title: Aaidentifier
          default: ''
      type: object
      required:
      - primaryId
      title: Borrower
      description: Borrower (vendor) in the OCEN loan application.
    Charge:
      properties:
        chargeType:
          type: string
          title: Chargetype
          default: FIXED_AMOUNT
        data:
          additionalProperties: true
          type: object
          title: Data
      type: object
      title: Charge
      description: Fee/charge structure.
    ConsentStatusResponse:
      properties:
        data_principal_id:
          type: string
          title: Data Principal Id
        consents:
          items:
            additionalProperties: true
            type: object
          type: array
          title: Consents
      type: object
      required:
      - data_principal_id
      - consents
      title: ConsentStatusResponse
    ContactDetail:
      properties:
        type:
          type: string
          title: Type
          default: PRIMARY
        description:
          type: string
          title: Description
          default: ''
        phone:
          type: string
          title: Phone
          default: ''
        email:
          type: string
          title: Email
          default: ''
        address:
          anyOf:
          - $ref: '#/components/schemas/Address'
          - type: 'null'
      type: object
      title: ContactDetail
      description: Borrower/applicant contact information.
    CreateLoanApplicationResponse:
      properties:
        metadata:
          $ref: '#/components/schemas/MetaData'
        productData:
          $ref: '#/components/schemas/ProductData'
        response:
          $ref: '#/components/schemas/ResponseStatus'
        loanApplications:
          items:
            $ref: '#/components/schemas/LoanApplication'
          type: array
          title: Loanapplications
      type: object
      required:
      - metadata
      - productData
      - response
      - loanApplications
      title: CreateLoanApplicationResponse
      description: "OCEN CreateLoanApplicationResponse \u2014 Lender sends back to\
        \ LA async.\n\nEndpoint: POST /v4.0.0alpha/loanApplications/createLoanResponse"
    DSRStatusResponse:
      properties:
        request_id:
          type: string
          title: Request Id
        status:
          type: string
          title: Status
        right_type:
          type: string
          title: Right Type
        sla_deadline:
          type: string
          title: Sla Deadline
        completed_at:
          anyOf:
          - type: string
          - type: 'null'
          title: Completed At
      type: object
      required:
      - request_id
      - status
      - right_type
      - sla_deadline
      title: DSRStatusResponse
    DSRSubmitRequest:
      properties:
        data_principal_id:
          type: string
          title: Data Principal Id
        right_type:
          type: string
          title: Right Type
      type: object
      required:
      - data_principal_id
      - right_type
      title: DSRSubmitRequest
    DSRSubmitResponse:
      properties:
        request_id:
          type: string
          title: Request Id
        status:
          type: string
          title: Status
        sla_deadline:
          type: string
          title: Sla Deadline
        workflow_id:
          type: string
          title: Workflow Id
      type: object
      required:
      - request_id
      - status
      - sla_deadline
      - workflow_id
