# DPDP Compliance Scenario Registry
# Each scenario defines a sequence of mock responses for integration testing.
# Select via: DPDP_SANDBOX_SCENARIO=<scenario_id>

scenarios:
  # ─── Consent Scenarios ─────────────────────────────────────────
  - id: consent_happy_path
    description: "Consent granted, full loan flow proceeds"
    category: consent
    steps:
      - action: consent_check
        response: {allowed: true}

  - id: consent_denied
    description: "Consent not granted — workflow terminates before D0"
    category: consent
    steps:
      - action: consent_check
        response: {allowed: false, reason: "consent_not_granted"}
    expected_outcome:
      workflow_status: rejected
      gate: dpdp_consent

  - id: consent_revoked_mid_flow
    description: "Consent revoked after D0 passes but before AA fetch"
    category: consent
    steps:
      - action: consent_check
        call_number: 1
        response: {allowed: true}
      - action: consent_check
        call_number: 2
        response: {allowed: false, reason: "consent_revoked"}
    expected_outcome:
      workflow_status: rejected
      gate: dpdp_consent_aa

  - id: consent_expired
    description: "Consent expired between sessions"
    category: consent
    steps:
      - action: consent_check
        response: {allowed: false, reason: "consent_expired"}
    expected_outcome:
      workflow_status: rejected
      gate: dpdp_consent

  # ─── DSR Scenarios ─────────────────────────────────────────────
  - id: dsr_access_success
    description: "Access request fulfilled — all PII returned"
    category: rights
    steps:
      - action: access_request
        response:
          status: fulfilled
          data:
            source: ocen_platform_db
            vendor: {name: "Test Vendor", gstin: "27AADCB2230M1ZT"}
            loan_applications: []
            consents: [{purpose: "loan_origination", granted: true}]

  - id: dsr_erasure_standard
    description: "Erasure request — PII pseudonymized, records retained"
    category: rights
    steps:
      - action: erasure_request
        legal_hold: false
        response:
          status: fulfilled
          result:
            source: ocen_platform_db
            erased: true
            pseudonymized_fields: [name, gstin, udyam_number, vendor_gstin]

  - id: dsr_erasure_with_legal_hold
    description: "Erasure request while loan within RBI 7-year window"
    category: rights
    steps:
      - action: erasure_request
        legal_hold: true
        response:
          status: held
          result:
            source: ocen_platform_db
            erased: false
            skipped_reason: legal_hold_active
    expected_outcome:
      erasure_completed: false
      held_sources: [ocen_platform_db]

  - id: dsr_correction_pending
    description: "Correction request queued for manual review"
    category: rights
    steps:
      - action: correction_request
        response:
          status: pending_review
          reason: correction_requires_manual_verification

  # ─── Retention Scenarios ───────────────────────────────────────
  - id: retention_loan_expired
    description: "Loan application past 7-year retention — pseudonymized"
    category: retention
    steps:
      - action: enforce_retention
        category: loan_application
        expired_count: 3
        response:
          category: loan_application
          action: enforced
          records_affected: 3

  - id: retention_mixed_categories
    description: "Multiple categories processed in single cron run"
    category: retention
    steps:
      - action: enforce_retention
        response:
          policies_processed: 5
          results:
            - {category: loan_application, action: enforced, records_affected: 2}
            - {category: aa_financial_data, action: enforced, records_affected: 15}
            - {category: vendor_contact, action: enforced, records_affected: 0}
            - {category: consent_record, action: no_handler, records_affected: 0}
            - {category: decision_receipt, action: no_handler, records_affected: 0}

  # ─── Breach Scenarios ──────────────────────────────────────────
  - id: breach_bulk_access_triggered
    description: "100+ records accessed in 5-min window triggers breach workflow"
    category: breach
    steps:
      - action: detect_breaches
        rule: bulk_access
        event_count: 150
        response: {confirmed: true, threshold: 100, actual: 150}
      - action: notify_dpbi
        response: {notified: true}
      - action: notify_principals
        response: {count: 12}

  - id: breach_below_threshold
    description: "Access below threshold — no breach confirmed"
    category: breach
    steps:
      - action: detect_breaches
        rule: bulk_access
        event_count: 50
        response: {confirmed: false, reason: below_threshold}

  - id: breach_failed_auth_spike
    description: "20+ failed auth attempts in 10-min window"
    category: breach
    steps:
      - action: detect_breaches
        rule: failed_auth
        event_count: 25
        response: {confirmed: true, threshold: 20, actual: 25}

  # ─── Race Condition Scenarios ──────────────────────────────────
  - id: race_concurrent_revoke_and_fetch
    description: "Consent revoked while AA fetch is in-flight"
    category: race_condition
    steps:
      - action: consent_check
        response: {allowed: true}
      - action: aa_fetch_start
        concurrent_revoke: true
      - action: consent_check
        response: {allowed: false, reason: "revoked_during_processing"}
    expected_outcome:
      data_discarded: true
      workflow_status: rejected

  - id: race_dual_erasure_request
    description: "Two erasure requests for same principal arrive simultaneously"
    category: race_condition
    steps:
      - action: erasure_request
        idempotency_key: "erasure-27AADCB2230M1ZT-2026"
        call_number: 1
        response: {status: fulfilled, erased: true}
      - action: erasure_request
        idempotency_key: "erasure-27AADCB2230M1ZT-2026"
        call_number: 2
        response: {status: already_processed, erased: false}
